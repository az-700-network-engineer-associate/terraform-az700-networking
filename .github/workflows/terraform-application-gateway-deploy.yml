
    name: Terraform Application Gateway with Fairway wall Deployment

    on:
      workflow_dispatch:
        inputs:
          environment:
            description: 'Environment to deploy to'
            required: true
            default: 'dev'
      push:
        branches:
          - main
        paths:
          - '/dev/application-gateway/**'
          - 'modules/application-gateway/**'
          - '.github/workflows/terraform-application-gateway-deploy.yml'
            
    permissions:
      id-token: write   # ✅ REQUIRED for Azure OIDC
      contents: read

    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_USE_OIDC: true


    jobs:
      deploy-bootstrap:
        uses: ./.github/workflows/terraform-bootstrap-deploy.yml
        with:
          environment: ${{ inputs.environment }}
        secrets: inherit

      deploy-appgtw-infra:
        runs-on: ubuntu-latest
        needs:
          - deploy-bootstrap

        steps:
          # Checkout Terraform Repo
          - name: Checkout Terraform Repo
            uses: actions/checkout@v4
            with:
              ref: main
              token: ${{ secrets.TF_REPO_TOKEN }}

          - name: List terraform repo Files
            run: ls -ltr

          # Setup Terraform
          - name: Setup Terraform
            uses: hashicorp/setup-terraform@v3

          # Azure Login
          - name: Azure Login
            uses: azure/login@v2
            with:
              client-id: ${{ secrets.ARM_CLIENT_ID }}
              tenant-id: ${{ secrets.ARM_TENANT_ID }}
              subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

          - name: Check rg-appgw-dev resource group exists
            id: check_rg-appgw-dev
            run: |
              if az group exists -n rg-appgw-dev; then
                echo "RG_APPGW_DEV_EXISTS=true" >> $GITHUB_ENV
                az group show -n rg-appgw-dev
                az group delete -n rg-appgw-dev -y
              else
                echo "RG_APPGW_DEV_EXISTS=false" >> $GITHUB_ENV
              fi
          
            # Terraform Init
          - name: Terraform Init
            working-directory: envs/${{ inputs.environment }}/application-gateway
            run: terraform init -backend-config="resource_group_name=rg-bootstrap-${{ inputs.environment }}" -backend-config="storage_account_name=storageacttfstate${{ inputs.environment }}" -backend-config="container_name=tf-state-${{ inputs.environment }}" -backend-config="key=app-gateway-${{ inputs.environment }}.tfstate"
          
          # Terraform Validate
          - name: Terraform Validate
            working-directory: envs/${{ inputs.environment }}/application-gateway
            run: terraform validate

          - name: List Terraform Files
            run: ls -R envs/${{ inputs.environment }}/application-gateway

          # Terraform Plan
          - name: Terraform Plan
            working-directory: envs/${{ inputs.environment }}/application-gateway
            run: terraform plan -out=tfplan

          # Terraform Apply
          - name: Terraform Apply
            if: github.ref == 'refs/heads/main'
            working-directory: envs/${{ inputs.environment }}/application-gateway
            run: terraform apply -auto-approve tfplan


      # 🔐 DESTROY (with approval)
      destroy-appgtw-infra:
        needs: [deploy-appgtw-infra]
        runs-on: ubuntu-latest
        # 👇 THIS IS THE MAGIC
        environment: ${{ inputs.environment }}

        steps:
          - name: Checkout
            uses: actions/checkout@v4
            with:
              ref: main
              token: ${{ secrets.TF_REPO_TOKEN }}

          - name: Setup Terraform
            uses: hashicorp/setup-terraform@v3

          - name: Azure Login
            uses: azure/login@v2
            with:
              client-id: ${{ secrets.ARM_CLIENT_ID }}
              tenant-id: ${{ secrets.ARM_TENANT_ID }}
              subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

          - name: Reconnect to Backend to get the state
            run: terraform init -reconfigure -backend-config="resource_group_name=rg-bootstrap-${{ inputs.environment }}" -backend-config="storage_account_name=storageacttfstate${{ inputs.environment }}" -backend-config="container_name=tf-state-${{ inputs.environment }}" -backend-config="key=app-gateway-${{ inputs.environment }}.tfstate"

          - name: App Gatewway Infra destroy
            working-directory: envs/${{ inputs.environment }}/application-gateway
            run: |
              terraform destroy -auto-approve 

      destroy-bootstrap:
        needs: [destroy-appgtw-infra]
        uses: ./.github/workflows/terraform-bootstrap-destroy.yml
        secrets: inherit
