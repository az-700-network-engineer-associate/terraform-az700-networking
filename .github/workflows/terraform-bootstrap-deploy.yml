name: Terraform Bootstrap + Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: string
        default: 'dev'

permissions:
  id-token: write
  contents: read

env:
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_USE_OIDC: true
  environment: ${{ inputs.environment }}

jobs:
  # 🧱 1) BOOTSTRAP (runs once or idempotent)
  deploy-bootstrap:
    runs-on: ubuntu-latest
    
    steps:
      - name : TF_TO_REPO_TOKEN 
        run: echo "TF_REPO_TOKEN is ${{ secrets.TF_REPO_TOKEN }}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.TF_REPO_TOKEN }}


      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Remove bootstrap resource group if exists
        id: check_rg_bootstrap
        run: |
          RG_EXISTS=$(az group exists -n rg-bootstrap-dev && echo "true" || echo "false")
          if [ "$RG_EXISTS" = "true" ]; then
            echo "RG_EXISTS=true" >> $GITHUB_ENV
            az group show -n rg-bootstrap-dev
            az group delete -n rg-bootstrap-dev -y
          else
            echo "RG_EXISTS=false" >> $GITHUB_ENV
          fi 

      - name: Terraform Init (bootstrap)
        working-directory: bootstrap
        run: terraform init

      - name: Terraform Apply (bootstrap)
        working-directory: bootstrap
        run: terraform apply -auto-approve -var="resource_group_name=rg-bootstrap-${{ inputs.environment }}" -var="storage_account_name=storageact${{ inputs.environment }}" -var="container_name=tf-state-${{ inputs.environment }}"  
        
 