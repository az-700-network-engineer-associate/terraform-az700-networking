name: Deploy Application Gateway WAF

on:
  workflow_dispatch:
    inputs:
      environment:
        type: string
        description: 'environment to deploy'
        default: 'dev'
  push:
    branches:
      - main
    paths:
      - 'envs/dev/application-gateway-waf/**'
      - 'modules/application-gateway-waf/**'
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/reusable-terraform-module-deploy.yml
    with:
      environment: ${{ inputs.environment || 'dev' }}
      working_directory: envs/${{ inputs.environment || 'dev' }}/application-gateway-waf
      backend_key: appgw-waf-${{ inputs.environment || 'dev' }}.tfstate
    secrets: inherit